name: Publish to NPM registry
permissions: {}
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to (re)publish, e.g. v1.0.2
        required: true
        type: string
jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      version: ${{ steps.release.outputs.version }}
    steps:
      # On workflow_dispatch there is no release event payload, so look the
      # release up by tag. This also rejects unknown tags before we spend
      # time building anything.
      - name: Resolve release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |-
          gh release view "$TAG" --repo "$REPO" --json tagName,isPrerelease \
            --jq '"tag=\(.tagName)\nprerelease=\(.isPrerelease)\nversion=\(.tagName | ltrimstr("v"))"' \
            >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 #v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --filter starlight-theme-exquisitus --frozen-lockfile --ignore-scripts
      # `allow-same-version` will not make the NPM registry accept a duplicate version
      - run: pnpm version "${TAG_NAME#v}" --no-git-tag-version --allow-same-version --filter starlight-theme-exquisitus
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
      - id: pack
        run: |-
          TARBALL=$(pnpm --filter starlight-theme-exquisitus pack | tail -n 1)
          echo "tarball=$(basename "$TARBALL")" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: tarball
          path: ${{ steps.pack.outputs.tarball }}
  publish:
    needs:
      - package
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
    env:
      TARBALL: ${{ needs.package.outputs.tarball }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: tarball
      # This job only pushes a tarball to the registry: no workspace, no
      # lockfile. It uses the npm that ships with Node rather than pnpm, so
      # there is no package manager to set up and nothing to read a version from.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 24
          # No checkout/install in this job, so there is no lockfile to cache.
          package-manager-cache: false
      # `latest` is a mutable pointer that `npm publish` moves with no semver
      # check, so backfilling an older version would silently steal it. Only
      # take `latest` when this version is the highest on the registry;
      # otherwise publish under a throwaway dist-tag.
      - name: Choose dist-tag
        id: dist-tag
        if: needs.package.outputs.prerelease != 'true'
        env:
          VERSION: ${{ needs.package.outputs.version }}
        run: |-
          set -euo pipefail
          CURRENT=$(npm view starlight-theme-exquisitus dist-tags.latest 2>/dev/null || true)
          if [ -z "$CURRENT" ]; then
            # First-ever publish: nothing to compare against.
            TAG=latest
          else
            # With pipefail, an npx failure aborts the step rather than
            # silently demoting a legitimate release to backfill.
            HIGHEST=$(npx --yes semver "$VERSION" "$CURRENT" | tail -n 1)
            if [ "$HIGHEST" = "$VERSION" ]; then TAG=latest; else TAG=backfill; fi
          fi
          echo "Publishing $VERSION as dist-tag '$TAG' (registry latest: ${CURRENT:-none})"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - run: npm publish --access public --tag next "$TARBALL"
        if: needs.package.outputs.prerelease == 'true'
      - run: npm publish --access public --tag "$DIST_TAG" "$TARBALL"
        if: needs.package.outputs.prerelease != 'true'
        env:
          DIST_TAG: ${{ steps.dist-tag.outputs.tag }}
